name: Update README

on:
  schedule:
    # Roda todo dia às 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # permite rodar manualmente pela aba Actions

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil lxml

      - name: Generate SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: Bru-lira
        run: python today.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git diff --cached --quiet || git commit -m "chore: atualiza SVG do perfil [skip ci]"
          git push
